<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#74ebd5,#9face6);
}

.container{
    width:420px;
    padding:25px;
    border-radius:18px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(15px);
    text-align:center;
}

h2{ color:#fff; margin-bottom:15px; }

input{
    width:70%;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    padding:12px;
    border:none;
    background:#065674;
    color:white;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
    transition:0.3s;
}

button:hover{
    background:#0a7aa6;
    transform:scale(1.05);
}

#weather{ margin-top:15px; color:#fff; }

#forecast{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.card{
    flex:1;
    padding:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.25);
    color:#fff;
}
</style>
</head>

<body>

<div class="container">

    <h2>🌤 Weather Dashboard</h2>

    <input type="text" id="city" placeholder="Enter city">

    <button onclick="getWeather()">Search</button>
    <button onclick="logout()" style="background:#ff4d4d;">Logout</button>

    <div id="weather"></div>
    <div id="forecast"></div>

</div>

<script src="dashboard.js"></script>

<script>
// logout function
function logout(){
    localStorage.removeItem("user");
    window.location.href = "index.html";
}

// optional security check
if(!localStorage.getItem("user")){
    window.location.href = "index.html";
}
</script>

</body>
</html>
