<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#e3f2fd;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:600px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#2196f3;
    margin-bottom:20px;
}

input{
    width:70%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 15px;
    border:none;
    background:#2196f3;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1976d2;
}

.weather{
    margin-top:20px;
}

.forecast{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

.card{
    background:#f5f5f5;
    padding:10px;
    border-radius:8px;
    width:30%;
}
</style>

</head>
<body>

<div class="container">

    <h1>🌤 Weather Dashboard</h1>

    <input type="text" id="city" placeholder="Enter city name">
    <button onclick="getWeather()">Search</button>

    <div class="weather" id="weather"></div>

    <div class="forecast" id="forecast"></div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
