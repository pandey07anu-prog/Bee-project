<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to right,#ebdf5d,#134eb4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:320px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:20px;
    color:#333;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#2196f3;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0b7dda;
}

#message{
    color:red;
    margin-top:10px;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>Weather App </h2>

    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>

        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Login</button>

        <p id="message"></p>
    </form>
</div>

<script src="js/login.js"></script>

</body>
</html>
